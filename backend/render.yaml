services:
  - type: web
    name: meraki-backend
    env: python
    region: ohio
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
